<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatitusTV Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #000; --side: #111; --accent: #6366f1; --yt: #ff0000; --txt: #ccc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        aside { width: 220px; background: var(--side); display: flex; flex-direction: column; border-right: 1px solid #222; height: 100vh; }
        .logo { padding: 15px; color: var(--accent); font-weight: bold; border-bottom: 1px solid #222; text-align: center; }
        #cats { flex: 1; overflow-y: auto; padding: 5px; }
        .cat-item { padding: 12px 10px; cursor: pointer; color: var(--txt); font-size: 14px; border-bottom: 1px solid #1a1a1a; }
        .cat-item.active { background: var(--accent); color: #fff; border-radius: 4px; }

        /* Main Content */
        main { flex: 1; display: flex; flex-direction: column; }
        header { padding: 10px; background: #000; border-bottom: 1px solid #222; }
        .search-bar { background: #222; border: 1px solid #333; padding: 12px; color: #fff; width: 100%; border-radius: 4px; outline: none; }
        
        #grid { 
            flex: 1; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 12px; 
            padding: 15px; 
            overflow-y: auto; 
            align-content: flex-start;
        }
        
        .card { background: #111; padding: 12px; text-align: center; border-radius: 6px; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
        .card:hover { border-color: var(--accent); background: #1a1a1a; }
        .card img { height: 45px; display: block; margin: 0 auto 8px; max-width: 100%; object-fit: contain; }
        .card div { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Fullscreen Player */
        #player { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; }
        #media-box { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        video, iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* Player UI Controls */
        .ui { position: absolute; inset: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; pointer-events: none; opacity: 0; transition: 0.3s; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent 20%, transparent 80%, rgba(0,0,0,0.8)); }
        #player:hover .ui { opacity: 1; }
        .z-btn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #444; width: 60px; height: 60px; border-radius: 50%; font-size: 30px; cursor: pointer; pointer-events: auto; display: flex; align-items: center; justify-content: center; }
        .z-btn:hover { background: var(--accent); border-color: #fff; }
        .top-bar { position: absolute; top: 20px; right: 20px; pointer-events: auto; }
        .close-btn { background: var(--yt); color: #fff; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<aside>
    <div class="logo">PATITUS TV</div>
    <div id="cats">
        <div class="cat-item active" id="btn-yt" onclick="loadYoutube(this)">▶ YouTube</div>
        <div class="cat-item" id="btn-all" onclick="loadMain(this)">📺 Canales TV</div>
        <div id="dynamic-cats"></div>
    </div>
</aside>

<main>
    <header><input type="text" id="search" class="search-bar" placeholder="Buscar canal..." oninput="searchChannels()"></header>
    <div id="grid">Iniciando sistema...</div>
</main>

<div id="player">
    <div id="media-box"></div>
    <div class="ui">
        <div class="top-bar"><button class="close-btn" onclick="stop()">CERRAR</button></div>
        <button class="z-btn" onclick="zap(-1)">❮</button>
        <button class="z-btn" onclick="zap(1)">❯</button>
    </div>
</div>

<script>
    var M3U_URL = 'https://raw.githubusercontent.com/patriciopujia-svg/PatitusTV/main/channel.m3u';
    var YT_URL = 'https://raw.githubusercontent.com/patriciopujia-svg/PatitusTV/main/youtube.json';

    var allChannels = [], currentList = [], displayList = [], hls = null, activeIdx = 0;

    window.onload = function() {
        fetchM3U();
        loadYoutube(document.getElementById('btn-yt'));
    };

    function fetchM3U() {
        fetch(M3U_URL).then(function(r){ return r.text(); }).then(function(d){
            allChannels = parseM3U(d);
            renderDynamicCats();
        });
    }

    function parseM3U(t) {
        var lines = t.split('\n'), res = [], tmp = null;
        for (var i = 0; i < lines.length; i++) {
            var l = lines[i].trim();
            if (l.indexOf('#EXTINF:') === 0) {
                var g = l.match(/group-title="([^"]+)"/);
                var img = l.match(/tvg-logo="([^"]+)"/);
                tmp = { n: l.split(',').pop(), g: g ? g[1] : 'Otros', l: img ? img[1] : '' };
            } else if (l.indexOf('http') === 0 && tmp) {
                tmp.u = l; res.push(tmp); tmp = null;
            }
        }
        return res;
    }

    function loadYoutube(el) {
        setActive(el);
        document.getElementById('grid').innerHTML = 'Cargando YouTube...';
        fetch(YT_URL).then(function(r){ return r.json(); }).then(function(data){
            currentList = data.map(function(i){ return { n: i.name, u: i.url, l: i.logo || '', g: 'YouTube' }; });
            displayList = currentList.slice();
            drawGrid();
        });
    }

    function loadMain(el) {
        setActive(el);
        currentList = allChannels;
        displayList = currentList.slice();
        drawGrid();
    }

    function drawGrid() {
        var g = document.getElementById('grid'); g.innerHTML = '';
        for (var i = 0; i < displayList.length; i++) {
            (function(idx){
                var c = displayList[idx];
                var d = document.createElement('div');
                d.className = 'card';
                d.innerHTML = '<img src="'+c.l+'" onerror="this.src=\'https://via.placeholder.com/80?text=TV\'"><div>'+c.n+'</div>';
                d.onclick = function() { activeIdx = idx; playStream(c); };
                g.appendChild(d);
            })(i);
        }
    }

    function playStream(ch) {
        var p = document.getElementById('player');
        var box = document.getElementById('media-box');
        p.style.display = 'block';
        box.innerHTML = '';
        if (hls) { hls.destroy(); hls = null; }

        var url = ch.u.trim();

        // Lógica YouTube Fullscreen
        if (url.indexOf('youtube.com') !== -1 || url.indexOf('youtu.be') !== -1) {
            var id = url.indexOf('v=') !== -1 ? url.split('v=')[1].split('&')[0] : url.split('/').pop().split('?')[0];
            box.innerHTML = '<iframe src="https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0&showinfo=0&iv_load_policy=3" allow="autoplay; fullscreen"></iframe>';
            return;
        }

        // Lógica HLS (TV y TyC Sports) sin restricciones de buffer
        var v = document.createElement('video');
        v.controls = true; v.autoplay = true; v.setAttribute('playsinline', 'true');
        box.appendChild(v);

        if (url.toLowerCase().indexOf('.m3u8') !== -1) {
            if (v.canPlayType('application/vnd.apple.mpegurl')) {
                v.src = url;
            } else if (Hls.isSupported()) {
                hls = new Hls(); // Configuración limpia para permitir 1080p
                hls.loadSource(url);
                hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, function() { v.play(); });
                hls.on(Hls.Events.ERROR, function(e, data) { if(data.fatal) v.src = url; });
            }
        } else {
            v.src = url;
            v.onerror = function() { box.innerHTML = '<iframe src="'+url+'" allow="autoplay; fullscreen"></iframe>'; };
        }
    }

    function zap(dir) {
        activeIdx = (activeIdx + dir + displayList.length) % displayList.length;
        playStream(displayList[activeIdx]);
    }

    function stop() {
        document.getElementById('player').style.display = 'none';
        if (hls) { hls.destroy(); hls = null; }
        document.getElementById('media-box').innerHTML = '';
    }

    function searchChannels() {
        var term = document.getElementById('search').value.toLowerCase();
        displayList = currentList.filter(function(c) { return c.n.toLowerCase().indexOf(term) !== -1; });
        drawGrid();
    }

    function renderDynamicCats() {
        var container = document.getElementById('dynamic-cats');
        container.innerHTML = '';
        var groups = [];
        for(var i=0; i<allChannels.length; i++) { if(groups.indexOf(allChannels[i].g) === -1) groups.push(allChannels[i].g); }
        groups.sort().forEach(function(g) {
            var d = document.createElement('div');
            d.className = 'cat-item'; d.innerText = "📁 " + g;
            d.onclick = function() { 
                setActive(d); 
                currentList = allChannels.filter(function(x) { return x.g === g; }); 
                displayList = currentList.slice();
                drawGrid(); 
            };
            container.appendChild(d);
        });
    }

    function setActive(el) {
        var items = document.querySelectorAll('.cat-item');
        for(var i=0; i<items.length; i++) items[i].classList.remove('active');
        if(el) el.classList.add('active');
    }

    // Control Remoto TV BOX
    window.onkeydown = function(e) {
        if (document.getElementById('player').style.display === 'block') {
            if (e.key === "ArrowRight" || e.keyCode === 39) zap(1);
            if (e.key === "ArrowLeft" || e.keyCode === 37) zap(-1);
            if (e.key === "Escape" || e.key === "Backspace" || e.keyCode === 8) stop();
        }
    };
</script>
</body>
</html>
